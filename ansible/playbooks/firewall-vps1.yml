---
- name: Configure VPS1 firewall — K3s + Traefik
  hosts: vps1
  become: true

  vars:
    vps2_ip: "2.24.65.38"

  tasks:
    - name: Install netfilter-persistent
      apt:
        name: [iptables-persistent, netfilter-persistent]
        state: present
        update_cache: true

    - name: Flush existing host INPUT rules (keep K3s chains)
      shell: |
        iptables -D INPUT -i lo -j ACCEPT 2>/dev/null || true
        iptables -D INPUT -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT 2>/dev/null || true
        iptables -D INPUT -p tcp --dport 22 -j ACCEPT 2>/dev/null || true
        iptables -D INPUT -p tcp --dport 80 -j ACCEPT 2>/dev/null || true
        iptables -D INPUT -p tcp --dport 443 -j ACCEPT 2>/dev/null || true
        iptables -D INPUT -p tcp --dport 6443 -j ACCEPT 2>/dev/null || true
        iptables -D INPUT -s {{ vps2_ip }} -j ACCEPT 2>/dev/null || true
        iptables -D INPUT -j DROP 2>/dev/null || true

    - name: Allow loopback
      iptables:
        chain: INPUT
        in_interface: lo
        jump: ACCEPT
        action: insert
        rule_num: 1

    - name: Allow established connections
      iptables:
        chain: INPUT
        ctstate: [ESTABLISHED, RELATED]
        jump: ACCEPT
        action: insert
        rule_num: 2

    - name: Allow SSH
      iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "22"
        jump: ACCEPT
        action: insert
        rule_num: 3

    - name: Allow HTTP
      iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "80"
        jump: ACCEPT
        action: insert
        rule_num: 4

    - name: Allow HTTPS
      iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "443"
        jump: ACCEPT
        action: insert
        rule_num: 5

    - name: Allow K3s API
      iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "6443"
        jump: ACCEPT
        action: insert
        rule_num: 6

    - name: Allow all traffic from VPS2
      iptables:
        chain: INPUT
        source: "{{ vps2_ip }}"
        jump: ACCEPT
        action: insert
        rule_num: 7

    - name: Drop everything else
      iptables:
        chain: INPUT
        jump: DROP

    - name: Persist firewall rules
      command: netfilter-persistent save
